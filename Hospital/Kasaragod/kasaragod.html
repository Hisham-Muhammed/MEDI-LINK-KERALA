            <button onclick="filterCity('all', this)" class="tab-btn px-6 py-2.5 rounded-xl bg-teal-600 text-white font-bold text-sm whitespace-nowrap shadow-lg shadow-teal-100">All (50+)</button>
            <button onclick="filterCity('kasaragod', this)" class="tab-btn px-6 py-2.5 rounded-xl bg-white text-slate-600 border border-slate-200 font-bold text-sm whitespace-nowrap hover:border-teal-400">Kasaragod Town</button>
            <button onclick="filterCity('kanhangad', this)" class="tab-btn px-6 py-2.5 rounded-xl bg-white text-slate-600 border border-slate-200 font-bold text-sm whitespace-nowrap hover:border-teal-400">Kanhangad</button>

            { name: "Health Complex Hospital", city: "uppala", type: "Private", lat: 12.6700, lng: 74.9080, img: "https://images.unsplash.com/photo-1538108197017-c1a986eb933d?q=80&w=400" }
        ];

        let userLocation = null;
        let activeFilter = 'all';

        function haversine(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon/2) * Math.sin(dLon/2);
            return (R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)))).toFixed(1);
        }

        function filterCity(city, el) {
            activeFilter = city;
            document.querySelectorAll('.tab-btn').forEach(b => {
                b.classList.remove('bg-teal-600', 'text-white', 'shadow-lg', 'shadow-teal-100');
                b.classList.add('bg-white', 'text-slate-600');
            });
            el.classList.add('bg-teal-600', 'text-white', 'shadow-lg', 'shadow-teal-100');
            el.classList.remove('bg-white', 'text-slate-600');
            render();
        }

        function render() {
            const grid = document.getElementById('hospitalGrid');
            grid.innerHTML = '';
            const list = activeFilter === 'all' ? hospitals : hospitals.filter(h => h.city === activeFilter);

            list.forEach(h => {
                const dist = userLocation ? haversine(userLocation.lat, userLocation.lng, h.lat, h.lng) : '...';
                const file = h.name.toLowerCase().replace(/[^a-z0-9]/g, '-') + '.html';

                grid.innerHTML += `
                    <div class="hosp-card flex flex-col cursor-pointer" onclick="window.location.href='${file}'">
                        <div class="h-40 overflow-hidden relative">
                            <img src="${h.img}" class="w-full h-full object-cover" alt="${h.name}">
                            <div class="absolute top-3 left-3">
                                <span class="bg-white/95 px-2 py-1 rounded-lg text-[9px] font-black uppercase text-teal-800 shadow-sm border border-slate-100">${h.type}</span>
                            </div>
                        </div>
                        <div class="p-4 flex-grow flex flex-col justify-between">
                            <div>
                                <h3 class="font-bold text-slate-800 text-sm leading-tight mb-1 truncate" title="${h.name}">${h.name}</h3>
                                <p class="text-[10px] text-slate-500 font-bold uppercase tracking-wider mb-3">
                                    <i class="fas fa-map-marker-alt text-rose-500 mr-1"></i> ${h.city}
                                </p>
                            </div>
                            <div class="flex items-center justify-between mt-2">
                                <span class="distance-tag px-2 py-1 rounded-lg text-[10px]">
                                    <i class="fas fa-route mr-1"></i> ${dist} KM
                                </span>
                                <i class="fas fa-chevron-right text-slate-300 text-xs"></i>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        window.onload = () => {
            render();
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    userLocation = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                    const banner = document.getElementById('locStatus');
                    banner.innerHTML = "<i class='fas fa-crosshairs mr-2'></i> GPS Connected • Showing Nearest Hospitals";
                    banner.classList.replace('bg-slate-900', 'bg-teal-600');
                    render();
                }, () => {
                    const banner = document.getElementById('locStatus');
                    banner.innerHTML = "<i class='fas fa-eye-slash mr-2'></i> Location Blocked • Using Default Sort";
                    banner.classList.replace('bg-slate-900', 'bg-rose-600');
                });
            }
        };
    </script>
</body>
